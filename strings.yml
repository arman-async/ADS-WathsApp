  /login - <b>اتصال به واتساپ</b>
  /login_status - <b>مشاهده وضعیت اتصال</b>
  /send - <b>شروع ارسال پیام</b>
  /help - <b>مشاهده راهنمای کامل </b>
  /support - <b>پشتیبانی و گزارش مشکل</b>


msg_help: | 
  <b>راهنمای استفاده از ربات</b>

  <b>1. اتصال به حساب واتساپ:</b>
  برای اتصال حساب، دستور /login را ارسال کنید و شماره خود را وارد نمایید. پس از آن ربات کدی به شما ارائه می‌دهد. به برنامه واتساپ خود بروید و مراحل زیر را طی کنید:
  - به بخش Linked devices بروید.
  - گزینه Link a device را انتخاب کنید.
  - در صفحه اسکن، روی گزینه Link with phone number instead کلیک کنید.
  - کدی که ربات به شما داده است را وارد کنید.
  <i>
  نکته: برای اتصال موفق باید از ابزار تغییر آی‌پی استفاده کنید. این عملیات باید در کمتر از 30 ثانیه انجام شود.
  </i>

  <b>2. بررسی وضعیت اتصال:</b>
  برای مشاهده وضعیت فعلی اتصال حساب واتساپ، دستور /login_status را ارسال کنید تا گزارش کوتاهی از وضعیت لاگین به شما نمایش داده شود.

  <b>3. ارسال پیام به گروه‌ها:</b>
  برای شروع فرآیند ارسال، دستور /send را ارسال کنید. 
  - لیست گروه‌ها نمایش داده می‌شود؛ گروه‌های مورد نظر را انتخاب کنید. (گزینه انتخاب همه نیز جهت سهولت در دسترس است).
  - پس از انتخاب، دکمه ادامه را بزنید.
  - در این مرحله، هر متنی که ارسال کنید توسط ربات ذخیره می‌شود. پس از پایان، دکمه ارسال را بزنید.

  <b>4. تنظیم سرعت ارسال:</b>
  پس از تایید نهایی، ربات از شما در مورد سرعت ارسال سوال خواهد کرد. با انتخاب بازه زمانی مناسب، از شناسایی حساب شما توسط واتساپ به عنوان اسپم جلوگیری می‌شود.

  برای تعویض حساب کاربری، می‌توانید در هر زمان دوباره از دستور /login استفاده کنید.

